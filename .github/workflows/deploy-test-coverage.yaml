name: Deploy Test Coverage to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Ensure .env.local exists
        run: |
          if [ ! -f .env.local ]; then
            cp .env.example .env.local
            echo "Copied .env.example to .env.local"
          else
            echo ".env.local already exists"
          fi

      - name: Run test coverage build
        run: |
          pnpm install --frozen-lockfile
          pnpm biome:fix
          pnpm knip
          pnpm test --coverage

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./coverage

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
